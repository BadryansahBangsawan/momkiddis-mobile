name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create alchemy config for CI
        run: |
          mkdir -p apps/web/.alchemy/local
          cat > apps/web/.alchemy/local/wrangler.jsonc << 'EOF'
          {
            "name": "momkiddis-web",
            "main": "@tanstack/react-start/server-entry",
            "compatibility_date": "2026-03-10",
            "compatibility_flags": ["nodejs_compat", "nodejs_compat_populate_process_env"],
            "assets": {
              "directory": "../../dist/client",
              "binding": "ASSETS",
              "not_found_handling": "none",
              "html_handling": "auto-trailing-slash",
              "run_worker_first": false
            },
            "vars": {
              "CORS_ORIGIN": "https://momkiddis-web.badryansah99.workers.dev",
              "BETTER_AUTH_URL": "https://momkiddis-web.badryansah99.workers.dev"
            },
            "d1_databases": [
              {
                "binding": "DB",
                "database_id": "01c08ce4-8621-446f-95db-19d2ee439df0",
                "database_name": "momkiddis-db",
                "migrations_dir": "../../packages/db/src/migrations",
                "preview_database_id": "01c08ce4-8621-446f-95db-19d2ee439df0"
              }
            ]
          }
          EOF

      - name: Build
        run: bun run build

      - name: Apply D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: d1 migrations apply momkiddis-db --remote --config wrangler.toml

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          secrets: |
            NVIDIA_API_KEY
            BETTER_AUTH_SECRET
          command: >
            deploy
            --config dist/server/wrangler.json
            --name momkiddis-web
            --var CORS_ORIGIN:https://momkiddis-web.badryansah99.workers.dev
            --var BETTER_AUTH_URL:https://momkiddis-web.badryansah99.workers.dev
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
